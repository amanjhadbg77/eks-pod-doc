apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-pod-doctor
  namespace: mcp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eks-pod-doctor
  template:
    metadata:
      labels:
        app: eks-pod-doctor
    spec:
      serviceAccountName: eks-pod-doctor
      containers:
        - name: server
          image: amanjhadbg777/devops:eks-pod-doc_1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
